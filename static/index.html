<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finpulse | Smart Stock Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #111312;
            --bg-surf: #181a19;
            --bg-card: #1e201f;
            --bg-card2: #232523;
            --border-d: #212321;
            --t1: #edecea;
            --t2: #7a7d7b;
            --t3: #3e403f;
            --green: #7bff6a;
            --red: #ff5c5c;
            --amber: #f5a623;
            --blue: #5ab4ff;
            --font-main: 'Sora', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }

        .tabular { font-variant-numeric: tabular-nums; }

        body {
            background-color: var(--bg-base);
            color: var(--t1);
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* SVG Noise Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 1. Icon Bar (68px) */
        .icon-bar {
            width: 68px;
            background-color: var(--bg-surf);
            border-right: 1px solid var(--border-d);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 24px;
        }

        .logo-sq {
            width: 36px;
            height: 36px;
            background: var(--green);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .nav-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--t2);
        }

        .nav-icon:hover { background: var(--bg-card); color: var(--t1); }
        .nav-icon.active { background: var(--bg-card2); color: var(--green); }
        .nav-icon.bottom { margin-top: auto; }

        /* 2. Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .greeting h1 { font-size: 21px; font-weight: 600; }
        .greeting p { font-size: 13px; color: var(--t2); margin-top: 4px; }

        .search-box {
            background: var(--bg-card);
            border: 1px solid var(--border-d);
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 300px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--t1);
            font-size: 13px;
            outline: none;
            width: 100%;
        }

        /* Ticker Strip */
        .ticker-strip {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-top: 8px;
            padding-bottom: 16px;
            margin-bottom: 24px;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .ticker-strip::-webkit-scrollbar { display: none; }

        .ticker-chip {
            background: var(--bg-surf);
            border: 1px solid var(--border-d);
            border-radius: 12px;
            padding: 12px 16px;
            min-width: 180px;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ticker-chip:hover { border-color: var(--t3); }
        .ticker-chip.active {
            border-color: var(--green);
            background: rgba(123, 255, 106, 0.05);
        }

        .chip-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .chip-symbol { font-size: 11px; font-weight: 700; color: var(--t1); }
        .chip-name { font-size: 10px; color: var(--t2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }
        .chip-price { font-size: 17px; font-weight: 700; }
        .chip-delta { font-size: 10px; font-weight: 600; margin-top: 2px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-d);
        }

        .stat-label { font-size: 11px; color: var(--t2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-value { font-size: 20px; font-weight: 700; }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }
        .stat-value.amber { color: var(--amber); }

        /* Chart Area */
        .chart-box {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 24px;
            border: 1px solid var(--border-d);
            flex: 1;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-title { font-size: 14px; font-weight: 600; color: var(--t2); }
        
        .filter-group { display: flex; gap: 8px; }
        .btn-filter {
            background: transparent;
            border: 1px solid var(--border-d);
            color: var(--t2);
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-filter.active {
            border-color: var(--green);
            color: var(--green);
            background: rgba(123, 255, 106, 0.08);
        }

        /* Compare Grid */
        .compare-box {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 24px;
            border: 1px solid var(--border-d);
            margin-top: 24px;
        }

        .compare-inputs { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
        select {
            background: var(--bg-card2);
            border: 1px solid var(--border-d);
            color: var(--t1);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            flex: 1;
        }
        .btn-run {
            background: var(--green);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }

        /* 3. Right Panel (286px) */
        .right-panel {
            width: 286px;
            background: var(--bg-surf);
            border-left: 1px solid var(--border-d);
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .active-header { margin-bottom: 32px; }
        .active-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .active-name { font-size: 15px; font-weight: 600; }
        .active-symbol { font-size: 11px; color: var(--t2); }
        .active-price { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .delta-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
        }
        .delta-badge.up { background: rgba(123, 255, 106, 0.1); color: var(--green); }
        .delta-badge.down { background: rgba(255, 92, 92, 0.1); color: var(--red); }

        .panel-section { margin-bottom: 32px; }
        .section-h { font-size: 11px; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1x; margin-bottom: 16px; }

        .performer-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }
        .perf-info { display: flex; flex-direction: column; }
        .perf-sym { font-size: 12px; font-weight: 600; }
        .perf-name { font-size: 10px; color: var(--t2); }
        .perf-val { font-size: 11px; font-weight: 700; }
        .perf-val.up { color: var(--green); }
        .perf-val.down { color: var(--red); }

        /* Prediction Grid */
        .pred-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .pred-cell {
            background: var(--bg-card);
            border: 1px solid var(--border-d);
            border-radius: 6px;
            padding: 8px 4px;
            text-align: center;
        }
        .pred-day { font-size: 9px; color: var(--t2); margin-bottom: 4px; }
        .pred-price { font-size: 10px; font-weight: 700; color: var(--amber); }

        /* Volatility Gauge */
        .v-gauge { margin-top: 16px; }
        .v-val { font-size: 19px; font-weight: 700; margin-bottom: 12px; }
        .v-track {
            height: 6px;
            background: var(--bg-card2);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .v-bar {
            height: 100%;
            background: linear-gradient(90deg, #3ecf30, #7bff6a, #f5a623);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .v-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 9px; color: var(--t3); }

        /* View Management */
        .view-container { display: none; width: 100%; animation: fadeIn 0.3s; }
        .view-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--bg-card); border: 1px solid var(--green);
            color: var(--t1); padding: 12px 24px; border-radius: 8px;
            font-size: 13px; font-weight: 500;
            opacity: 0; transform: translateY(20px);
            transition: all 0.3s ease; z-index: 10000;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* Pulse Animations */
        @keyframes pulseGreen {
            0% { color: var(--t1); text-shadow: none; }
            50% { color: var(--green); text-shadow: 0 0 10px rgba(123, 255, 106, 0.5); }
            100% { color: var(--t1); text-shadow: none; }
        }
        .pulse-up { animation: pulseGreen 1s ease-out; }

        @keyframes pulseRed {
            0% { color: var(--t1); text-shadow: none; }
            50% { color: var(--red); text-shadow: 0 0 10px rgba(255, 92, 92, 0.5); }
            100% { color: var(--t1); text-shadow: none; }
        }
        .pulse-down { animation: pulseRed 1s ease-out; }

        /* Autocomplete Dropdown */
        .search-wrapper { position: relative; width: 300px; }
        .search-box { width: 100%; background: var(--bg-card); border: 1px solid var(--border-d); border-radius: 12px; }
        .autocomplete-dropdown {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: var(--bg-card); border: 1px solid var(--border-d);
            border-radius: 8px; margin-top: 4px; max-height: 200px;
            overflow-y: auto; z-index: 10; display: none;
        }
        .autocomplete-item {
            padding: 10px 16px; font-size: 12px; cursor: pointer;
            border-bottom: 1px solid var(--border-d); color: var(--t1);
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: var(--bg-card2); color: var(--green); }

        /* Export Button */
        .btn-export {
            background: transparent; border: 1px solid var(--border-d);
            color: var(--t2); font-size: 11px; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-left: 8px;
        }
        .btn-export:hover { border-color: var(--t1); color: var(--t1); }

        /* Markets Table */
        .markets-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .markets-table th, .markets-table td {
            padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border-d); font-size: 13px;
        }
        .markets-table th { color: var(--t2); font-weight: 600; cursor: pointer; user-select: none; }
        .markets-table th:hover { color: var(--t1); }
        .sort-icon { font-size: 10px; margin-left: 4px; color: var(--green); }
        .markets-table tbody tr:hover { background: var(--bg-card); cursor: pointer; }

        /* Utility */
                /* Analytics Grid Layout */
                .ana-grid {
                    padding: 16px 26px 26px;
                    display: flex;
                    flex-direction: column;
                    gap: 14px;
                    overflow-y: auto;
                }
        
                .ana-card {
                    background: var(--bg-card);
                    border-radius: 15px;
                    padding: 24px;
                    border: 1px solid var(--border-d);
                }
        
                .ana-title { font-size: 14px; font-weight: 600; color: var(--t1); margin-bottom: 4px; }
                .ana-subtitle { font-size: 11px; color: var(--t2); margin-bottom: 16px; }
        
                /* Daily Returns Bar */
                .returns-row {
                    display: flex; align-items: center; margin-bottom: 12px; gap: 12px;
                }
                .returns-symbol { width: 72px; font-size: 12px; font-weight: 600; flex-shrink: 0; }
                .returns-bar-track {
                    flex: 1; height: 28px; background: var(--bg-card2); border-radius: 6px;
                    position: relative; display: flex; align-items: center; overflow: hidden;
                }
                .returns-bar {
                    height: 100%; border-radius: 6px; min-width: 4px; transition: width 0.3s ease;
                }
                .returns-value { width: 60px; text-align: right; font-size: 12px; font-weight: 600; }
        
                /* Volatility Chart & Correlation Grid */
                .ana-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
                .vol-chart { height: 300px; position: relative; }
        
                /* Correlation Heatmap */
                .corr-grid { display: inline-grid; gap: 0; }
                .corr-header, .corr-row { display: grid; grid-template-columns: 80px repeat(5, 1fr); gap: 0; }
                .corr-label, .corr-cell {
                    padding: 8px; text-align: center; font-size: 10px; font-weight: 500;
                    min-height: 36px; display: flex; align-items: center; justify-content: center;
                }
                .corr-label { background: var(--bg-card2); color: var(--t2); border: 1px solid var(--border-d); }
                .corr-header-cell { background: var(--bg-card2); color: var(--t2); border: 1px solid var(--border-d); }
                .corr-cell { border: 1px solid var(--border-d); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-d); border-radius: 10px; }
    </style>
</head>
<body>
    <!-- Icon Bar -->
    <nav class="icon-bar">
        <div class="logo-sq">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        </div>
        <div class="nav-icon active" id="navDashboard" title="Dashboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        </div>
        <div class="nav-icon" id="navMarkets" title="Markets">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
        </div>
        <div class="nav-icon" id="navAnalytics" title="Analytics">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        </div>
        <div class="nav-icon bottom" title="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="top-bar">
            <div class="greeting">
                <h1 id="greetingMsg">Good Morning, Finpulse 👋</h1>
                <p id="currentDate">Monday, 30 March 2026</p>
            </div>
            <div class="search-wrapper">
                <div class="search-box" style="width: 100%; border: none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="Search markets..." autocomplete="off">
                </div>
                <div class="autocomplete-dropdown" id="searchDropdown"></div>
            </div>
        </div>

        <div class="ticker-strip" id="tickerStrip">
            <!-- Ticker Chips loaded via JS -->
        </div>

        <div id="view-dashboard" class="view-container active">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">52W High</div>
                <div class="stat-value green tabular" id="high52w">₹0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">52W Low</div>
                <div class="stat-value red tabular" id="low52w">₹0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Close</div>
                <div class="stat-value tabular" id="avgClose">₹0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Volatility</div>
                <div class="stat-value amber tabular" id="volValue">0.000</div>
            </div>
        </div>

        <div class="chart-box">
            <div class="chart-header">
                <div class="chart-title" id="chartTitle">Closing Price Trend</div>
                <div class="filter-group">
                    <button class="btn-filter active" onclick="filterData(30)">30D</button>
                    <button class="btn-filter" onclick="filterData(90)">90D</button>
                    <button class="btn-filter" onclick="filterData(365)">1Y</button>
                    <button class="btn-export" onclick="exportCSV()">Export CSV</button>
                </div>
            </div>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="compare-box">
            <div class="section-h">⚖️ Compare Performance</div>
            <div class="compare-inputs">
                <select id="compare1"></select>
                <select id="compare2"></select>
                <button class="btn-run" onclick="compareStocks()">Run ↗</button>
            </div>
            <div id="compareResult" style="height: 200px; display:none;">
                <canvas id="compareChart"></canvas>
            </div>
        </div>
        </div> <!-- End view-dashboard -->

        <div id="view-markets" class="view-container">
            <div class="section-h" style="font-size:16px; margin-bottom: 20px;">Markets Overview</div>
            <table class="markets-table">
                <thead>
                    <tr>
                        <th onclick="sortMarketsTable('symbol')">Symbol<span class="sort-icon" id="sort-ind-symbol"></span></th>
                        <th onclick="sortMarketsTable('name')">Company<span class="sort-icon" id="sort-ind-name"></span></th>
                        <th onclick="sortMarketsTable('price')">Price<span class="sort-icon" id="sort-ind-price"></span></th>
                        <th onclick="sortMarketsTable('delta')">Change<span class="sort-icon" id="sort-ind-delta"></span></th>
                    </tr>
                </thead>
                <tbody id="marketsTableBody"></tbody>
            </table>
        </div>

        <div id="view-analytics" class="view-container ana-grid">
            <!-- Analytics content rendered by buildAnalytics() -->
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Right Panel -->
    <aside class="right-panel">
        <div class="active-header">
            <div class="active-meta">
                <span class="active-name" id="activeName">---</span>
                <span class="active-symbol" id="activeSymbol">---</span>
            </div>
            <div class="active-price tabular" id="activePrice">₹0.00</div>
            <div class="delta-badge" id="activeDelta">+0.00%</div>
        </div>

        <div class="panel-section">
            <div class="section-h">Top Gainers</div>
            <div id="gainersList"></div>
        </div>

        <div class="panel-section">
            <div class="section-h">Top Losers</div>
            <div id="losersList"></div>
        </div>

            <div class="section-h">7-Day Prediction</div>
            <div class="pred-grid" id="predGrid">
                <!-- 7 Cells (M T W T F S S) -->
            </div>
        </div>

        <div class="panel-section">
            <div class="section-h">Volatility Index</div>
            <div class="v-gauge">
                <div class="v-val tabular" id="vIndexVal">0.00</div>
                <div class="v-track">
                    <div class="v-bar" id="vBar" style="width: 0%"></div>
                </div>
                <div class="v-labels">
                    <span>LOW</span>
                    <span>MED</span>
                    <span>HIGH</span>
                </div>

    <script>
        let currentSymbol = '';
        let fullStockData = [];
        let mainChart = null;
        let compareChart = null;
        
        let allCompanies = [];
        let autoRefreshInterval = null;
        let marketsData = [];
        let currentSortCol = 'symbol';
        let sortAsc = true;
        let activeFilterDays = 30;

        document.addEventListener('DOMContentLoaded', () => {
            setGreeting();
            loadCompanies();
            loadTopPerformers();
        });

        function setGreeting() {
            const hour = new Date().getHours();
            const msg = hour < 12 ? "Good Morning" : hour < 18 ? "Good Afternoon" : "Good Evening";
            document.getElementById('greetingMsg').innerText = `${msg}, Finpulse 👋`;
            
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', options);
        }

        async function loadCompanies() {
            const res = await fetch('/companies');
            const companies = await res.json();
            allCompanies = companies;
            const strip = document.getElementById('tickerStrip');
            const sel1 = document.getElementById('compare1');
            const sel2 = document.getElementById('compare2');
            
            strip.innerHTML = '';
            for (const company of companies) {
                // Fetch latest data for the chip price/delta
                const dataRes = await fetch(`/data/${company.symbol}`);
                const data = await dataRes.json();
                const latest = data[data.length - 1];
                const prev = data[data.length - 2] || latest;
                const delta = ((latest.close - prev.close) / prev.close * 100).toFixed(2);
                const isUp = delta >= 0;

                const chip = document.createElement('div');
                chip.className = 'ticker-chip';
                chip.setAttribute('data-symbol', company.symbol);
                chip.innerHTML = `
                    <div class="chip-top">
                        <span class="chip-symbol">${company.symbol}</span>
                        <span class="chip-name">${company.name}</span>
                    </div>
                    <div class="chip-price tabular">₹${latest.close.toLocaleString()}</div>
                    <div class="chip-delta ${isUp ? 'text-success' : 'text-danger'}" style="color: ${isUp ? 'var(--green)' : 'var(--red)'}">
                        ${isUp ? '↑' : '↓'} ${Math.abs(delta)}%
                    </div>
                `;
                chip.onclick = () => selectCompany(company, latest, delta);
                strip.appendChild(chip);

                sel1.add(new Option(company.symbol, company.symbol));
                sel2.add(new Option(company.symbol, company.symbol));
            }

            if(companies.length > 0) {
                // Fetch first company's data to select it
                const firstRes = await fetch(`/data/${companies[0].symbol}`);
                const firstData = await firstRes.json();
                const firstLatest = firstData[firstData.length-1];
                const firstPrev = firstData[firstData.length-2] || firstLatest;
                const firstDelta = ((firstLatest.close - firstPrev.close) / firstPrev.close * 100).toFixed(2);
                selectCompany(companies[0], firstLatest, firstDelta);
            }
            
            loadMarketsData();
            startAutoRefresh();
        }

        async function selectCompany(company, latest, delta) {
            currentSymbol = company.symbol;
            showToast(`Loaded ${company.name}`);
            
            // UI Updates
            document.getElementById('activeName').innerText = company.name;
            document.getElementById('activeSymbol').innerText = company.symbol;
            document.getElementById('activePrice').innerText = `₹${latest.close.toLocaleString()}`;
            
            const deltaEl = document.getElementById('activeDelta');
            deltaEl.innerText = `${delta >= 0 ? '+' : ''}${delta}%`;
            deltaEl.className = `delta-badge ${delta >= 0 ? 'up' : 'down'}`;

            // Highlight chip
            document.querySelectorAll('.ticker-chip').forEach(c => {
                c.classList.toggle('active', c.getAttribute('data-symbol') === company.symbol);
            });

            // Fetch secondary data
            const dataRes = await fetch(`/data/${company.symbol}`);
            fullStockData = await dataRes.json();
            
            const summaryRes = await fetch(`/summary/${company.symbol}`);
            const summary = await summaryRes.json();
            
            updateStatsAndPanel(summary, fullStockData[fullStockData.length-1]);
            filterData(30);
            loadPredictions(company.symbol);
        }

        function updateStatsAndPanel(summary, latest) {
            document.getElementById('high52w').innerText = `₹${summary.high_52w.toLocaleString()}`;
            document.getElementById('low52w').innerText = `₹${summary.low_52w.toLocaleString()}`;
            document.getElementById('avgClose').innerText = `₹${summary.avg_close.toLocaleString()}`;
            const volValue = latest.volatility_score || 0;
            document.getElementById('volValue').innerText = volValue.toFixed(4);
            
            // Volatility Gauge
            document.getElementById('vIndexVal').innerText = volValue.toFixed(4);
            const vPercent = Math.min(100, Math.max(0, (volValue / 0.05) * 100)); // Scaled to 0.05 as 'High'
            document.getElementById('vBar').style.width = `${vPercent}%`;
        }

        async function filterData(days) {
            activeFilterDays = days;
            const filtered = fullStockData.slice(-days);
            const labels = filtered.map(d => d.date);
            const prices = filtered.map(d => d.close);
            const ma7 = filtered.map(d => d['7_day_ma']);

            const predRes = await fetch(`/predict/${currentSymbol}`);
            const predictions = await predRes.json();
            
            const predLabels = [labels[labels.length-1], ...predictions.map(p => p.date)];
            const predPrices = [prices[prices.length-1], ...predictions.map(p => p.prediction)];

            renderMainChart(labels, prices, ma7, predLabels, predPrices);
            
            document.querySelectorAll('.btn-filter').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === (days == 30 ? '30D' : days == 90 ? '90D' : '1Y'));
            });
        }

        function renderMainChart(labels, prices, ma7, predLabels, predPrices) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(mainChart) mainChart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(123, 255, 106, 0.15)');
            gradient.addColorStop(1, 'rgba(123, 255, 106, 0)');

            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Price',
                            data: prices,
                            borderColor: '#7bff6a',
                            backgroundColor: gradient,
                            fill: true,
                            tension: 0.15,
                            pointRadius: 0,
                            borderWidth: 2
                        },
                        {
                            label: '7-Day MA',
                            data: ma7,
                            borderColor: '#f5a623',
                            borderDash: [4, 4],
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: false
                        },
                        {
                            label: 'Prediction',
                            data: Array(labels.length-1).fill(null).concat(predPrices),
                            borderColor: '#5ab4ff',
                            borderDash: [6, 6],
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            spanGaps: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e201f',
                            borderColor: '#2c2e2d',
                            borderWidth: 1,
                            titleFont: { family: 'Sora', size: 12 },
                            bodyFont: { family: 'Sora', size: 12 }
                        }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#cbd5e1', font: { family: 'Sora', size: 9 } } },
                        y: { 
                            grid: { color: '#212321' }, 
                            ticks: { 
                                color: '#cbd5e1', 
                                font: { family: 'Sora', size: 9 },
                                callback: val => '₹' + val
                            } 
                        }
                    }
                }
            });
        }

        async function loadPredictions(symbol) {
            const res = await fetch(`/predict/${symbol}`);
            const data = await res.json();
            const grid = document.getElementById('predGrid');
            grid.innerHTML = '';
            
            const days = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
            data.forEach((p, i) => {
                const cell = document.createElement('div');
                cell.className = 'pred-cell';
                cell.innerHTML = `
                    <div class="pred-day">${days[i]}</div>
                    <div class="pred-price tabular">${Math.round(p.prediction)}</div>
                `;
                grid.appendChild(cell);
            });
        }

        async function compareStocks() {
            const s1 = document.getElementById('compare1').value;
            const s2 = document.getElementById('compare2').value;
            const res = await fetch(`/compare?symbol1=${s1}&symbol2=${s2}`);
            if(!res.ok) {
                showToast('Error comparing stocks');
                return;
            }
            const data = await res.json();
            
            // Extract dates and align data
            const dates = [...data[s1].map(d => d.date), ...data[s2].map(d => d.date)];
            const uniqueDates = [...new Set(dates)].sort();
            
            // Map close prices by date for each symbol
            const s1Map = Object.fromEntries(data[s1].map(d => [d.date, d.close]));
            const s2Map = Object.fromEntries(data[s2].map(d => [d.date, d.close]));
            const s1Data = uniqueDates.map(d => s1Map[d] || null);
            const s2Data = uniqueDates.map(d => s2Map[d] || null);
            
            document.getElementById('compareResult').style.display = 'block';
            const ctx = document.getElementById('compareChart').getContext('2d');
            if(compareChart) compareChart.destroy();

            compareChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: uniqueDates,
                    datasets: [
                        { label: s1, data: s1Data, borderColor: '#7bff6a', pointRadius: 0, yAxisID: 'y', tension: 0.1 },
                        { label: s2, data: s2Data, borderColor: '#5ab4ff', pointRadius: 0, yAxisID: 'y1', tension: 0.1 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true, labels: { color: '#7a7d7b', font: { size: 10 } } } },
                    scales: {
                        x: { display: false },
                        y: { type: 'linear', display: true, position: 'left', grid: { display: false }, ticks: { color: '#7bff6a', font: { size: 8 } } },
                        y1: { type: 'linear', display: true, position: 'right', grid: { display: false }, ticks: { color: '#5ab4ff', font: { size: 8 } } }
                    }
                }
            });
        }

        async function loadTopPerformers() {
            const res = await fetch('/top_performers');
            const data = await res.json();
            const gList = document.getElementById('gainersList');
            const lList = document.getElementById('losersList');
            
            gList.innerHTML = '';
            lList.innerHTML = '';

            data.gainers.forEach(g => {
                gList.innerHTML += `
                    <div class="performer-card">
                        <div class="perf-info">
                            <span class="perf-sym" style="color:var(--green)">${g.symbol}</span>
                        </div>
                        <span class="perf-val up tabular">+${g.return}%</span>
                    </div>
                `;
            });

            data.losers.forEach(l => {
                lList.innerHTML += `
                    <div class="performer-card">
                        <div class="perf-info">
                            <span class="perf-sym" style="color:var(--red)">${l.symbol}</span>
                        </div>
                        <span class="perf-val down tabular">${l.return}%</span>
                    </div>
                `;
            });
        }

        /* NEW LOGIC for EXPORT, TOAST, VIEWS, SHORTCUTS, AUTO-REFRESH & MARKETS TABLE */
        
        function exportCSV() {
            if(!fullStockData || !currentSymbol) return;
            const filtered = fullStockData.slice(-activeFilterDays);
            let csv = "Date,Open,High,Low,Close,Volume\n";
            filtered.forEach(d => {
                csv += `${d.date},${d.open},${d.high},${d.low},${d.close},${d.volume}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', `${currentSymbol}_${activeFilterDays}D.csv`);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
            
            const viewEl = document.getElementById(`view-${viewName}`);
            if(viewEl) viewEl.classList.add('active');
            
            if(viewName === 'dashboard') document.getElementById('navDashboard').classList.add('active');
            if(viewName === 'markets') {
                document.getElementById('navMarkets').classList.add('active');
                renderMarketsTable();
            }
            if(viewName === 'analytics') {
                document.getElementById('navAnalytics').classList.add('active');
                buildAnalytics();
            }
        }

        if(document.getElementById('navDashboard')) document.getElementById('navDashboard').onclick = () => switchView('dashboard');
        /* Helper: Mock seeded price generator */
        function mockP(base, n, sym) {
            const seed = sym.charCodeAt(0) * 73 + sym.charCodeAt(sym.length-1) * 17;
            let val = base;
            for(let i = 0; i < n; i++) {
                const rnd = Math.sin(seed + i * 0.5) * 10000 % 1;
                val *= (1 + (rnd - 0.5) * 0.08);
            }
            return val;
        }
        
        /* Local storage for analytics chart instance */
        let volChart = null;
        
        async function buildAnalytics() {
            const container = document.getElementById('view-analytics');
            if(!container) return;
            
            // Destroy existing chart if present
            if(volChart) { volChart.destroy(); volChart = null; }
            
            // Generate mock data immediately (don't await)
            const mockData = {
                returns: {},
                volatility: {},
                prices: {}
            };
            
            const basePrice = { 'RELIANCE.NS': 2800, 'TCS.NS': 3900, 'INFY.NS': 2000, 'HDFCBANK.NS': 1700, 'WIPRO.NS': 700 };
            
            for (const sym of ['RELIANCE.NS', 'TCS.NS', 'INFY.NS', 'HDFCBANK.NS', 'WIPRO.NS']) {
                mockData.returns[sym] = (Math.random() - 0.5) * 4;
                mockData.volatility[sym] = 0.008 + Math.random() * 0.025;
                mockData.prices[sym] = [];
                for (let i = 0; i < 30; i++) {
                    mockData.prices[sym].push(mockP(basePrice[sym], i, sym));
                }
            }
            
            // Render immediately with mock data
            renderAnalytics(mockData);
            
            // Fetch real data and update (non-blocking)
            try {
                const syms = ['RELIANCE.NS', 'TCS.NS', 'INFY.NS', 'HDFCBANK.NS', 'WIPRO.NS'];
                for (const sym of syms) {
                    const res = await fetch(`/data/${sym}?days=30`);
                    const data = await res.json();
                    if (data && data.length > 0) {
                        const latest = data[data.length - 1];
                        const prev = data[data.length - 2] || latest;
                        mockData.returns[sym] = ((latest.close - latest.open) / latest.open) * 100;
                        mockData.volatility[sym] = latest.volatility_score || mockData.volatility[sym];
                        mockData.prices[sym] = data.map(d => d.close);
                    }
                }
                renderAnalytics(mockData);
            } catch(err) { console.error("Analytics data fetch error:", err); }
        }
        
        function renderAnalytics(data) {
            const container = document.getElementById('view-analytics');
            if(!container) return;
            
            // Destroy existing chart before re-rendering
            if(volChart) { volChart.destroy(); volChart = null; }
            
            container.innerHTML = '';
            
            /* SECTION A: Daily Returns Bar */
            const returnsCard = document.createElement('div');
            returnsCard.className = 'ana-card';
            returnsCard.innerHTML = '<div class="ana-title">Daily Returns by Stock</div><div class="ana-subtitle">Today\'s return = (Close − Open) / Open</div>';
            
            for (const sym of ['RELIANCE.NS', 'TCS.NS', 'INFY.NS', 'HDFCBANK.NS', 'WIPRO.NS']) {
                const ret = data.returns[sym] || 0;
                const isPos = ret >= 0;
                const barW = Math.max(4, Math.abs(ret) * 8);
                const row = document.createElement('div');
                row.className = 'returns-row';
                row.innerHTML = `
                    <div class="returns-symbol">${sym}</div>
                    <div class="returns-bar-track">
                        <div class="returns-bar" style="background: ${isPos ? 'var(--green)' : 'var(--red)'}; width: ${barW}px;"></div>
                    </div>
                    <div class="returns-value" style="color: ${isPos ? 'var(--green)' : 'var(--red)'};">${ret.toFixed(2)}%</div>
                `;
                returnsCard.appendChild(row);
            }
            container.appendChild(returnsCard);
            
            /* SECTION B & C: 2-Column Layout */
            const twoCol = document.createElement('div');
            twoCol.className = 'ana-2col';
            
            /* SECTION B: Volatility Chart */
            const volCard = document.createElement('div');
            volCard.className = 'ana-card';
            volCard.innerHTML = '<div class="ana-title">Volatility Comparison</div><div class="ana-subtitle">30-day rolling std dev of daily returns</div><div class="vol-chart"><canvas id="volChart"></canvas></div>';
            twoCol.appendChild(volCard);
            
            /* SECTION C: Correlation Heatmap */
            const corrCard = document.createElement('div');
            corrCard.className = 'ana-card';
            corrCard.innerHTML = '<div class="ana-title">Price Correlation Matrix</div><div class="ana-subtitle">30-day closing price correlation (−1 to +1)</div>';
            
            const symbols = ['RELIANCE.NS', 'TCS.NS', 'INFY.NS', 'HDFCBANK.NS', 'WIPRO.NS'];
            const corrGrid = document.createElement('div');
            corrGrid.className = 'corr-grid';
            
            // Header row
            const header = document.createElement('div');
            header.className = 'corr-header';
            header.innerHTML = '<div class="corr-label"></div>';
            symbols.forEach(s => {
                header.innerHTML += `<div class="corr-header-cell">${s.split('.')[0]}</div>`;
            });
            corrGrid.appendChild(header);
            
            // Correlation matrix rows
            for (let i = 0; i < symbols.length; i++) {
                const row = document.createElement('div');
                row.className = 'corr-row';
                row.innerHTML = `<div class="corr-label">${symbols[i].split('.')[0]}</div>`;
                
                for (let j = 0; j < symbols.length; j++) {
                    const prices1 = data.prices[symbols[i]] || [];
                    const prices2 = data.prices[symbols[j]] || [];
                    let corr = i === j ? 1 : 0;
                    
                    if (prices1.length > 1 && prices2.length && prices1.length === prices2.length) {
                        const mean1 = prices1.reduce((a, b) => a + b, 0) / prices1.length;
                        const mean2 = prices2.reduce((a, b) => a + b, 0) / prices2.length;
                        const cov = prices1.reduce((sum, p1, idx) => sum + (p1 - mean1) * (prices2[idx] - mean2), 0) / prices1.length;
                        const std1 = Math.sqrt(prices1.reduce((sum, p) => sum + Math.pow(p - mean1, 2), 0) / prices1.length);
                        const std2 = Math.sqrt(prices2.reduce((sum, p) => sum + Math.pow(p - mean2, 2), 0) / prices2.length);
                        corr = std1 && std2 ? cov / (std1 * std2) : 0;
                    }
                    
                    const corrAbs = Math.abs(corr);
                    let bgColor, txtColor;
                    if (corr > 0) {
                        bgColor = `rgba(123,255,106,${corrAbs * 0.6})`;
                        txtColor = corrAbs > 0.5 ? '#111312' : 'var(--t1)';
                    } else {
                        bgColor = `rgba(255,92,92,${corrAbs * 0.6})`;
                        txtColor = corrAbs > 0.5 ? '#111312' : 'var(--t1)';
                    }
                    
                    const cell = document.createElement('div');
                    cell.className = 'corr-cell';
                    cell.style.background = bgColor;
                    cell.style.color = txtColor;
                    cell.innerText = corr.toFixed(2);
                    row.appendChild(cell);
                }
                corrGrid.appendChild(row);
            }
            corrCard.appendChild(corrGrid);
            twoCol.appendChild(corrCard);
            
            container.appendChild(twoCol);
            
            /* Create volatility chart */
            setTimeout(() => {
                const ctx = document.getElementById('volChart');
                if (ctx) {
                    const volData = symbols.map(s => data.volatility[s] || 0.015);
                    const barColors = volData.map(v => {
                        if (v < 0.012) return 'rgba(123,255,106,0.6)';
                        if (v < 0.022) return 'rgba(245,166,35,0.6)';
                        return 'rgba(255,92,92,0.6)';
                    });
                    
                    volChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: symbols.map(s => s.split('.')[0]),
                            datasets: [{
                                label: 'Volatility',
                                data: volData,
                                backgroundColor: barColors,
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            indexAxis: 'y',
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { grid: { color: '#212321' }, ticks: { color: '#cbd5e1', font: { family: 'Sora', size: 10 } } },
                                y: { ticks: { color: '#cbd5e1', font: { family: 'Sora', size: 10 } } }
                            }
                        }
                    });
                }
            }, 100);
        }
        
        if(document.getElementById('navDashboard')) document.getElementById('navDashboard').onclick = () => switchView('dashboard');
        if(document.getElementById('navMarkets')) document.getElementById('navMarkets').onclick = () => switchView('markets');
        if(document.getElementById('navAnalytics')) document.getElementById('navAnalytics').onclick = () => switchView('analytics');

        document.addEventListener('keydown', (e) => {
            const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
            if(activeTag === 'input' || activeTag === 'select' || activeTag === 'textarea') return;
            
            const key = e.key.toLowerCase();
            if(['1','2','3','4','5'].includes(key)) {
                const idx = parseInt(key) - 1;
                if(allCompanies[idx]) {
                    const company = allCompanies[idx];
                    fetch(`/data/${company.symbol}`).then(res => res.json()).then(data => {
                        const latest = data[data.length-1];
                        const prev = data[data.length-2] || latest;
                        const delta = ((latest.close - prev.close)/prev.close * 100).toFixed(2);
                        selectCompany(company, latest, delta);
                    });
                }
            } else if(key === 'm') switchView('markets');
            else if(key === 'a') switchView('analytics');
            else if(key === 'd') switchView('dashboard');
        });

        const searchInputEl = document.getElementById('searchInput');
        const searchDropdownEl = document.getElementById('searchDropdown');
        
        if (searchInputEl) {
            searchInputEl.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                searchDropdownEl.innerHTML = '';
                if(!val) { searchDropdownEl.style.display = 'none'; return; }
                
                const matches = allCompanies.filter(c => c.name.toLowerCase().includes(val) || c.symbol.toLowerCase().includes(val));
                if(matches.length > 0) {
                    matches.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        div.innerHTML = `<strong>${m.symbol}</strong> - ${m.name}`;
                        div.onclick = () => {
                            searchInputEl.value = '';
                            searchDropdownEl.style.display = 'none';
                            fetch(`/data/${m.symbol}`).then(res => res.json()).then(data => {
                                const latest = data[data.length-1];
                                const prev = data[data.length-2] || latest;
                                const delta = ((latest.close - prev.close)/prev.close * 100).toFixed(2);
                                selectCompany(m, latest, delta);
                            });
                        };
                        searchDropdownEl.appendChild(div);
                    });
                    searchDropdownEl.style.display = 'block';
                } else {
                    searchDropdownEl.style.display = 'none';
                }
            });
            
            document.addEventListener('click', (e) => {
                if(!e.target.closest('.search-wrapper')) searchDropdownEl.style.display = 'none';
            });
        }

        function startAutoRefresh() {
            if(autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(async () => {
                if(!currentSymbol) return;
                try {
                    const res = await fetch(`/data/${currentSymbol}`);
                    const data = await res.json();
                    const latest = data[data.length-1];
                    const prev = data[data.length-2] || latest;
                    const delta = ((latest.close - prev.close)/prev.close * 100).toFixed(2);
                    
                    const oldPriceEl = document.getElementById('activePrice');
                    const oldPrice = parseFloat(oldPriceEl.innerText.replace(/[^0-9.-]+/g, ""));
                    
                    oldPriceEl.innerText = `₹${latest.close.toLocaleString()}`;
                    const deltaEl = document.getElementById('activeDelta');
                    deltaEl.innerText = `${delta >= 0 ? '+' : ''}${Math.abs(delta).toFixed(2)}%`;
                    deltaEl.className = `delta-badge ${delta >= 0 ? 'up' : 'down'}`;
                    
                    if(latest.close > oldPrice) {
                        oldPriceEl.classList.remove('pulse-up', 'pulse-down');
                        void oldPriceEl.offsetWidth;
                        oldPriceEl.classList.add('pulse-up');
                    } else if(latest.close < oldPrice) {
                        oldPriceEl.classList.remove('pulse-up', 'pulse-down');
                        void oldPriceEl.offsetWidth;
                        oldPriceEl.classList.add('pulse-down');
                    }
                    
                    loadMarketsData();
                } catch(err) { console.error("Auto-refresh failed", err); }
            }, 60000);
        }

        async function loadMarketsData() {
            marketsData = [];
            for (const company of allCompanies) {
                try {
                    const dataRes = await fetch(`/data/${company.symbol}`);
                    const data = await dataRes.json();
                    const latest = data[data.length - 1];
                    const prev = data[data.length - 2] || latest;
                    const delta = parseFloat(((latest.close - prev.close) / prev.close * 100).toFixed(2));
                    marketsData.push({ symbol: company.symbol, name: company.name, price: latest.close, delta: delta, companyObj: company, latestData: latest });
                } catch(err) { console.error(err); }
            }
            if(document.getElementById('view-markets') && document.getElementById('view-markets').classList.contains('active')) {
                renderMarketsTable();
            }
        }

        function sortMarketsTable(col) {
            if(currentSortCol === col) sortAsc = !sortAsc;
            else { currentSortCol = col; sortAsc = true; }
            renderMarketsTable();
        }

        function renderMarketsTable() {
            const sorted = [...marketsData].sort((a, b) => {
                let valA = a[currentSortCol], valB = b[currentSortCol];
                if(typeof valA === 'string') { valA = valA.toLowerCase(); valB = valB.toLowerCase(); }
                if(valA < valB) return sortAsc ? -1 : 1;
                if(valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            
            const tbody = document.getElementById('marketsTableBody');
            if(!tbody) return;
            tbody.innerHTML = '';
            sorted.forEach(row => {
                const tr = document.createElement('tr');
                tr.onclick = () => {
                    selectCompany(row.companyObj, row.latestData, row.delta.toFixed(2));
                    switchView('dashboard');
                };
                tr.innerHTML = `
                    <td style="font-weight:600; color:var(--t1);">${row.symbol}</td>
                    <td>${row.name}</td>
                    <td class="tabular">₹${row.price.toLocaleString()}</td>
                    <td class="tabular" style="color:${row.delta >= 0 ? 'var(--green)' : 'var(--red)'}">${row.delta >= 0 ? '+' : ''}${Math.abs(row.delta).toFixed(2)}%</td>
                `;
                tbody.appendChild(tr);
            });
            
            document.querySelectorAll('.sort-icon').forEach(el => el.innerText = '');
            const activeInd = document.getElementById(`sort-ind-${currentSortCol}`);
            if(activeInd) activeInd.innerText = sortAsc ? '↑' : '↓';
        }
    </script>
</body>
</html>
